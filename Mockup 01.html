*{box-sizing:border-box}
:root{--gold:#d6a10d;--bg:#eeeeee;--ink:#222}
body{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:#eee;color:var(--ink);overflow:hidden}
.app{height:100vh;display:grid;grid-template-columns:1fr 340px}
.stage{position:relative;display:flex;align-items:center;justify-content:center;background:#eeeeee}
canvas{width:min(92vw,calc(100vw - 410px));height:auto;max-height:94vh;display:block}
.brand{position:absolute;top:20px;left:28px;display:flex;flex-direction:column;align-items:flex-start;gap:5px;pointer-events:none}
.brand img{width:144px;height:auto;display:block;filter:drop-shadow(0 6px 14px rgba(0,0,0,.12))}
.version{font-size:9px;letter-spacing:.08em;text-transform:uppercase;font-weight:800;color:#555;margin-left:56px;margin-top:-2px}
.panel{height:100vh;overflow:auto;background:#fffffff0;border-left:1px solid #0001;padding:24px 22px;box-shadow:-20px 0 50px #0001}
.upload{display:block;border:2px dashed #999;border-radius:18px;padding:28px 18px;text-align:center;cursor:pointer;margin-bottom:18px;background:#ffffff80}
.upload:hover,.upload.drag{border-color:#c99618;background:#fff8e7}
.upload strong{display:block;font-size:16px;margin-bottom:10px}
.upload span{color:#666;font-size:13px}
.logoUpload{display:block;border:1px dashed #bbb;border-radius:14px;padding:14px;text-align:center;cursor:pointer;margin:12px 0 18px;background:#fff}
.logoUpload strong{display:block;font-size:13px;margin-bottom:6px}
.logoUpload span{font-size:12px;color:#666}
input[type=file]{display:none}
.scope{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0 20px}
.scope button{margin:0;padding:10px 4px;border-radius:9px;border:1px solid #ddd;background:#f4f4f4;color:#333;font-size:12px;font-weight:900;cursor:pointer}
.scope button.active{background:#222;color:#fff;border-color:#222}
.control{margin:18px 0}
.row{display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:14px;margin-bottom:9px}
.row small{font-size:13px;color:#111}
input[type=range]{width:100%}
input[type=color]{width:100%;height:34px;padding:3px;background:#fff;border:1px solid #aaa;border-radius:4px}.colorLine{display:grid;grid-template-columns:1fr auto;gap:8px}.pick{border:1px solid #bbb;background:#fff;border-radius:7px;padding:0 10px;font-weight:900;cursor:pointer}
#download{width:100%;border:0;border-radius:10px;background:linear-gradient(180deg,#d9a722,#be8710);color:white;font-weight:900;font-size:15px;padding:15px;cursor:pointer;margin:18px 0}
.note{background:#f4f4f4;border-radius:12px;padding:14px;font-size:13px;line-height:1.45}
.meta{margin-top:16px;color:#666;font-size:12px;line-height:1.5;white-space:pre-line}
.disabled{opacity:.35;pointer-events:none}
</style>

<script>
const canvas=document.getElementById('preview');
const ctx=canvas.getContext('2d',{alpha:false});
ctx.imageSmoothingEnabled=true;
ctx.imageSmoothingQuality='high';

const ui={
  file:document.getElementById('file'),
  photographerLogo:document.getElementById('photographerLogo'),
  drop:document.getElementById('drop'),
  tableColor:document.getElementById('tableColor'),
  tableColorLabel:document.getElementById('tableColorLabel'),
  spine:document.getElementById('spine'),
  spineLabel:document.getElementById('spineLabel'),
  size:document.getElementById('size'),
  sizeLabel:document.getElementById('sizeLabel'),
  shadow:document.getElementById('shadow'),
  shadowLabel:document.getElementById('shadowLabel'),
  relief:document.getElementById('relief'),
  reliefLabel:document.getElementById('reliefLabel'),
  reliefColor:document.getElementById('reliefColor'),
  reliefColorLabel:document.getElementById('reliefColorLabel'),
  eyeDrop:document.getElementById('eyeDrop'),
  meta:document.getElementById('meta'),
  download:document.getElementById('download')
};

let sourceImg=null;
let photographerLogo=null;

const state={
  spine:3.5,
  size:96,
  shadow:70,
  relief:55,
  reliefColor:'#eeeeee'
};

function hexToRgb(hex){
  const h=hex.replace('#','').trim();
  const v=parseInt(h.length===3?h.split('').map(c=>c+c).join(''):h,16);
  return {r:(v>>16)&255,g:(v>>8)&255,b:v&255};
}
function rgba(hex,a){const {r,g,b}=hexToRgb(hex);return `rgba(${r},${g},${b},${a})`;}

function roundedRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}


function getCoverRatio(parts){
  // Razão única e compartilhada por capa fechada, fundo fechado e capa/fundo no álbum aberto.
  // Isso evita que cada mockup calcule sua proporção de forma independente.
  return parts.cwSrc / parts.ih;
}

function fitInside(maxW,maxH,ratio){
  let h=maxH;
  let w=h*ratio;
  if(w>maxW){w=maxW;h=w/ratio;}
  return {w,h};
}

function drawImageCrop(img,sx,sy,sw,sh,dx,dy,dw,dh,clipRadius=0){
  ctx.save();
  if(clipRadius>0){roundedRect(ctx,dx,dy,dw,dh,clipRadius);ctx.clip();}
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);
  ctx.restore();
}

function getPrintArea(){
  const W=canvas.width,H=canvas.height;
  return {
    x: W*.155,
    y: H*.082,
    w: W*.690,
    h: H*.865,
    line: Math.max(16, Math.round(W*.008))
  };
}

function splitSource(img,spinePercent){
  const iw=img.naturalWidth, ih=img.naturalHeight;
  const spSrc=Math.max(0,Math.round(iw*spinePercent/100));
  const cwSrc=Math.max(1,Math.floor((iw-spSrc)/2));
  return {
    iw,ih,spSrc,cwSrc,
    back:{sx:0, sw:cwSrc},
    spine:{sx:cwSrc, sw:spSrc},
    front:{sx:cwSrc+spSrc, sw:cwSrc}
  };
}

function drawOutsideBg(){
  const W=canvas.width,H=canvas.height;
  ctx.fillStyle='#eeeeee';
  ctx.fillRect(0,0,W,H);
}

function drawPrintArea(){
  const a=getPrintArea();
  ctx.save();
  ctx.fillStyle=ui.tableColor.value;
  ctx.fillRect(a.x,a.y,a.w,a.h);

  const g=ctx.createRadialGradient(a.x+a.w*.50,a.y+a.h*.44,0,a.x+a.w*.50,a.y+a.h*.44,a.w*.78);
  g.addColorStop(0,'#ffffff55');
  g.addColorStop(.62,'#ffffff12');
  g.addColorStop(1,'#0000000a');
  ctx.fillStyle=g;
  ctx.fillRect(a.x,a.y,a.w,a.h);

  // leve vinheta interna da área imprimível
  const vg=ctx.createLinearGradient(a.x,a.y,a.x,a.y+a.h);
  vg.addColorStop(0,'rgba(255,255,255,.10)');
  vg.addColorStop(.5,'rgba(255,255,255,0)');
  vg.addColorStop(1,'rgba(0,0,0,.035)');
  ctx.fillStyle=vg;
  ctx.fillRect(a.x,a.y,a.w,a.h);
  ctx.restore();
  return a;
}

function drawFrameLines(a){
  const topH=a.h*.455;
  ctx.save();
  ctx.fillStyle='#fff';
  ctx.globalAlpha=.98;
  // linha horizontal separando topo do álbum aberto
  ctx.fillRect(a.x, a.y+topH-a.line/2, a.w, a.line);
  // linha vertical somente na faixa superior
  ctx.fillRect(a.x+a.w/2-a.line/2, a.y, a.line, topH);
  ctx.restore();
}

function shadowClosed(x,y,w,h,v){
  if(!v)return;
  const s=v/100;
  ctx.save();
  ctx.globalAlpha=.15*s;
  ctx.filter=`blur(${34*s}px)`;
  ctx.fillStyle='#000';
  roundedRect(ctx,x+w*.035,y+h*.035,w+w*.08,h+h*.08,2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=.17*s;
  ctx.filter=`blur(${10*s}px)`;
  ctx.fillStyle='#000';
  roundedRect(ctx,x+w*.020,y+h*.018,w+w*.025,h+h*.025,2);
  ctx.fill();
  ctx.restore();
}

function shadowOpen(x,y,w,h,v){
  if(!v)return;
  const s=v/100;
  ctx.save();
  ctx.globalAlpha=.19*s;
  ctx.filter=`blur(${58*s}px)`;
  ctx.fillStyle='#000';
  roundedRect(ctx,x-52*s,y-48*s,w+28*s,h+18*s,2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.globalAlpha=.22*s;
  ctx.filter=`blur(${14*s}px)`;
  ctx.fillStyle='#000';
  roundedRect(ctx,x-13*s,y-13*s,w+3*s,h+4*s,2);
  ctx.fill();
  ctx.restore();
}

function drawDorsoOpen(x,y,w,h,r){
  if(w<=.5)return;
  const k=r/100;
  let g=ctx.createLinearGradient(x,y,x+w,y);
  g.addColorStop(0,`rgba(0,0,0,${.18*k})`);
  g.addColorStop(.12,`rgba(0,0,0,${.10*k})`);
  g.addColorStop(.25,`rgba(255,255,255,${.26*k})`);
  g.addColorStop(.50,`rgba(0,0,0,${.025*k})`);
  g.addColorStop(.77,`rgba(255,255,255,${.20*k})`);
  g.addColorStop(.91,`rgba(0,0,0,${.10*k})`);
  g.addColorStop(1,`rgba(0,0,0,${.15*k})`);
  ctx.fillStyle=g;
  ctx.fillRect(x,y,w,h);

  ctx.save();
  ctx.globalAlpha=.14*k;
  ctx.filter='blur(.55px)';
  ctx.fillStyle='#000';
  ctx.fillRect(x-1,y+1,1.5,h-2);
  ctx.fillRect(x+w-.5,y+1,1.5,h-2);
  ctx.restore();
}

function drawClosedAlbum(part, slot){
  const cfg=state;
  const parts=splitSource(sourceImg,cfg.spine);
  const cropPart=part==='front'?parts.front:parts.back;
  const ratio=getCoverRatio(parts);

  // Usa sempre cálculo proporcional único: primeiro define o envelope disponível,
  // depois encaixa mantendo ratio. A espessura fica fora da imagem, não altera a proporção da capa.
  const thick=Math.max(2, cfg.relief*.075);
  const maxW=(slot.w*.76)-thick;
  const maxH=(slot.h*(cfg.size/100)*.88)-thick;
  const dim=fitInside(maxW,maxH,ratio);
  const w=dim.w, h=dim.h;

  const x=slot.x+(slot.w-(w+thick))/2;
  const y=slot.y+(slot.h-(h+thick))/2-6;

  shadowClosed(x,y,w,h,cfg.shadow);

  const rc=cfg.reliefColor;

  // espessura inferior e direita, controladas e discretas
  let gB=ctx.createLinearGradient(x,y+h,x,y+h+thick);
  gB.addColorStop(0,rgba(rc,.95));
  gB.addColorStop(.45,rgba(rc,.80));
  gB.addColorStop(1,'rgba(70,70,65,.24)');
  ctx.fillStyle=gB;
  ctx.fillRect(x+1,y+h,w-2,thick);

  let gR=ctx.createLinearGradient(x+w,y,x+w+thick,y);
  gR.addColorStop(0,rgba(rc,.90));
  gR.addColorStop(.56,rgba(rc,.70));
  gR.addColorStop(1,'rgba(70,70,65,.22)');
  ctx.fillStyle=gR;
  ctx.fillRect(x+w,y+1,thick,h-1);

  drawImageCrop(sourceImg,cropPart.sx,0,cropPart.sw,parts.ih,x,y,w,h,0);

  // reflexo sutil na capa/fundo
  ctx.save();
  ctx.globalCompositeOperation='screen';
  ctx.globalAlpha=.10*(cfg.relief/100);
  const gl=ctx.createLinearGradient(x,y,x+w,y+h);
  gl.addColorStop(0,'rgba(255,255,255,.50)');
  gl.addColorStop(.45,'rgba(255,255,255,.02)');
  gl.addColorStop(1,'rgba(255,255,255,.04)');
  ctx.fillStyle=gl;
  ctx.fillRect(x,y,w,h);
  ctx.restore();

  return {x,y,w,h};
}

function drawOpenAlbum(slot){
  const cfg=state;
  const parts=splitSource(sourceImg,cfg.spine);
  const ratio=getCoverRatio(parts);

  const maxTotalW=slot.w*.86;
  const maxAlbumH=slot.h*(cfg.size/100)*.90;

  // Primeiro calcula pelo limite de altura e depois reduz uniformemente pelo limite de largura.
  // Nenhuma peça é escalada sozinha: costas, dorso e frente usam o mesmo fator.
  let albumH=maxAlbumH;
  let cw=albumH*ratio;
  let spW=parts.spSrc ? albumH*(parts.spSrc/parts.ih) : 0;
  let total=cw*2+spW;

  if(total>maxTotalW){
    const f=maxTotalW/total;
    albumH*=f; cw*=f; spW*=f; total=maxTotalW;
  }

  const x=slot.x+(slot.w-total)/2;
  const y=slot.y+(slot.h-albumH)/2+4;

  shadowOpen(x,y,total,albumH,cfg.shadow);

  drawImageCrop(sourceImg,parts.back.sx,0,parts.back.sw,parts.ih,x,y,cw,albumH,0);
  if(spW>0){
    drawImageCrop(sourceImg,parts.spine.sx,0,parts.spine.sw,parts.ih,x+cw,y,spW,albumH,0);
    drawDorsoOpen(x+cw,y,spW,albumH,cfg.relief);
  }
  drawImageCrop(sourceImg,parts.front.sx,0,parts.front.sw,parts.ih,x+cw+spW,y,cw,albumH,0);
  return {x,y,w:total,h:albumH,coverW:cw,coverH:albumH};
}

function drawPhotographerLogo(a){
  if(!photographerLogo)return;
  const maxW=a.w*.135, maxH=a.h*.075;
  const ratio=photographerLogo.naturalWidth/photographerLogo.naturalHeight;
  let w=maxW,h=w/ratio;
  if(h>maxH){h=maxH;w=h*ratio;}
  const x=a.x+a.w*.035;
  const y=a.y+a.h-maxH-a.h*.035;
  ctx.save();
  ctx.globalAlpha=.96;
  ctx.drawImage(photographerLogo,x,y,w,h);
  ctx.restore();
}

function placeholder(a){
  const boxW=a.w*.58, boxH=a.h*.30;
  const x=a.x+(a.w-boxW)/2, y=a.y+(a.h-boxH)/2;
  shadowOpen(x,y,boxW,boxH,80);
  ctx.fillStyle='#f7f2ee';
  ctx.fillRect(x,y,boxW,boxH);
  ctx.fillStyle='#0006';
  ctx.font='700 64px Inter,Arial';
  ctx.textAlign='center';
  ctx.fillText('Envie a arte aberta',a.x+a.w/2,a.y+a.h/2+18);
  ui.meta.textContent='Aguardando imagem...';
}

function render(){
  const W=canvas.width,H=canvas.height;
  drawOutsideBg();
  const area=drawPrintArea();

  ui.tableColorLabel.textContent=ui.tableColor.value;
  ui.reliefColorLabel.textContent=state.reliefColor;

  if(!sourceImg){
    placeholder(area);
    drawPhotographerLogo(area);
    return;
  }

  ctx.save();
  roundedRect(ctx,area.x,area.y,area.w,area.h,0);
  ctx.clip();

  const topH=area.h*.455;
  const line=area.line;
  const topY=area.y;
  const bottomY=area.y+topH+line/2;
  const bottomH=area.h-topH-line/2;

  const topLeft={
    x:area.x,
    y:topY,
    w:area.w/2-line/2,
    h:topH-line/2
  };
  const topRight={
    x:area.x+area.w/2+line/2,
    y:topY,
    w:area.w/2-line/2,
    h:topH-line/2
  };
  const bottom={
    x:area.x,
    y:bottomY,
    w:area.w,
    h:bottomH
  };

  drawClosedAlbum('front',topLeft);
  drawClosedAlbum('back',topRight);
  drawOpenAlbum(bottom);

  ctx.restore();

  drawFrameLines(area);
  drawPhotographerLogo(area);

  const parts=splitSource(sourceImg,state.spine);
  ui.meta.textContent=`Imagem: ${parts.iw}×${parts.ih}px
Costas/capa: ${parts.cwSrc}×${parts.ih}px
Dorso: ${parts.spSrc}px (${state.spine.toFixed(1)}%)
Área imprimível: ${Math.round(area.w)}×${Math.round(area.h)}px
Logo do fotógrafo: ${photographerLogo?'sim':'não'}
Exportação: ${W}×${H}px`;
}

function updateLabels(){
  ui.spineLabel.textContent=(+ui.spine.value).toFixed(1)+'%';
  ui.sizeLabel.textContent=ui.size.value+'%';
  ui.shadowLabel.textContent=ui.shadow.value;
  ui.reliefLabel.textContent=ui.relief.value;
}

function applyControls(){
  state.spine=+ui.spine.value;
  state.size=+ui.size.value;
  state.shadow=+ui.shadow.value;
  state.relief=+ui.relief.value;
  state.reliefColor=ui.reliefColor.value;
  updateLabels();
  render();
}

function loadFile(file, target){
  if(!file)return;
  const url=URL.createObjectURL(file);
  const img=new Image();
  img.onload=()=>{
    if(target==='logo') photographerLogo=img;
    else sourceImg=img;
    render();
    URL.revokeObjectURL(url);
  };
  img.src=url;
}

ui.file.addEventListener('change',e=>loadFile(e.target.files[0],'album'));
ui.photographerLogo.addEventListener('change',e=>loadFile(e.target.files[0],'logo'));

['dragenter','dragover'].forEach(ev=>ui.drop.addEventListener(ev,e=>{e.preventDefault();ui.drop.classList.add('drag')}));
['dragleave','drop'].forEach(ev=>ui.drop.addEventListener(ev,e=>{e.preventDefault();ui.drop.classList.remove('drag')}));
ui.drop.addEventListener('drop',e=>loadFile(e.dataTransfer.files[0],'album'));

[ui.tableColor,ui.spine,ui.size,ui.shadow,ui.relief,ui.reliefColor].forEach(el=>el.addEventListener('input',applyControls));

ui.eyeDrop.addEventListener('click',async()=>{
  if(!('EyeDropper' in window)) { alert('Conta-gotas não suportado neste navegador. Use o seletor de cor.'); return; }
  const eyeDropper=new EyeDropper();
  try{
    const result=await eyeDropper.open();
    ui.reliefColor.value=result.sRGBHex;
    applyControls();
  }catch(e){}
});

ui.download.addEventListener('click',()=>{
  render();
  const a=document.createElement('a');
  a.download='mockup-album-etapa-2-v7-4k.png';
  a.href=canvas.toDataURL('image/png');
  a.click();
});

ui.spine.value=state.spine;
ui.size.max=98;
ui.size.value=Math.min(state.size,98);
ui.shadow.value=state.shadow;
ui.relief.value=state.relief;
ui.reliefColor.value=state.reliefColor;
updateLabels();
render();
</script>
</body>
</html>
